<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Horario — EduCoins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../shared/shared.css" />

  <!-- SDK Clerk para páginas protegidas -->
  <script data-clerk-publishable-key="pk_test_bG92aW5nLXJhcHRvci0xLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>

  <style>
    /* ══════════════════════════════════════════
   VARIABLES Y RESET
══════════════════════════════════════════ */
    :root {
      --bg: #07071a;
      --bg2: #0f0f2e;
      --bg3: #0a0a20;
      --bg4: #1a1a3e;
      --violet: #7c3aed;
      --violet-l: #a78bfa;
      --cyan: #06b6d4;
      --green: #22c55e;
      --yellow: #facc15;
      --red: #ef4444;
      --orange: #f97316;
      --border: rgba(124, 58, 237, .2);
      --border-b: rgba(124, 58, 237, .3);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-mut: #475569;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(124, 58, 237, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 58, 237, .03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* ══════════════════════════════════════════
   LAYOUT — usa shared.css (.layout + .main)
   No redefinir aquí para no duplicar estilos.
══════════════════════════════════════════ */
    .main-content-horario {
      max-width: 1200px;
    }

    /* ══════════════════════════════════════════
   VISTA INVITADO (selector colegio/grado)
══════════════════════════════════════════ */
    #vistaInvitado {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-h) - 4rem);
    }

    .invitado-card {
      background: var(--bg2);
      border: 1px solid var(--border-b);
      border-radius: 20px;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 0 60px rgba(124, 58, 237, .15);
    }

    .invitado-logo {
      display: flex;
      align-items: center;
      gap: .875rem;
      margin-bottom: 1.5rem;
    }

    .inv-logo-box {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .invitado-titulo {
      font-family: 'Press Start 2P', monospace;
      font-size: .65rem;
      color: white;
      margin-bottom: .375rem;
    }

    .invitado-sub {
      font-size: .875rem;
      color: var(--text-dim);
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .inv-label {
      font-size: .72rem;
      font-weight: 800;
      color: var(--text-dim);
      display: block;
      margin-bottom: .375rem;
      text-transform: uppercase;
    }

    .inv-select {
      width: 100%;
      padding: .75rem 1rem;
      background: var(--bg4);
      border: 1px solid var(--border-b);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      margin-bottom: 1rem;
      appearance: none;
      cursor: pointer;
      transition: border-color .2s;
    }

    .inv-select:focus {
      outline: none;
      border-color: var(--violet);
    }

    .inv-btn {
      width: 100%;
      padding: .875rem;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Press Start 2P', monospace;
      font-size: .5rem;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(124, 58, 237, .3);
    }

    .inv-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(124, 58, 237, .4);
    }

    .inv-btn:disabled {
      opacity: .4;
      pointer-events: none;
    }

    /* ══════════════════════════════════════════
   VISTA HORARIO (alumno / admin)
══════════════════════════════════════════ */
    #vistaHorario {
      display: none;
    }

    /* Header de página */
    .horario-page-header {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .horario-titulo-wrap {
      flex: 1;
    }

    .horario-titulo {
      font-family: 'Press Start 2P', monospace;
      font-size: .75rem;
      color: white;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
    }

    .horario-subtitulo {
      font-size: .8rem;
      color: var(--text-dim);
      font-weight: 700;
      margin-top: .4rem;
    }

    .horario-chips {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: .375rem;
      background: rgba(124, 58, 237, .12);
      border: 1px solid var(--border-b);
      border-radius: 20px;
      padding: .3rem .75rem;
      font-size: .78rem;
      font-weight: 800;
      color: var(--violet-l);
    }

    .chip-admin {
      background: rgba(250, 204, 21, .1);
      border-color: rgba(250, 204, 21, .3);
      color: #fde68a;
    }

    /* Botón editar horario */
    .btn-editar-modo {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 10px;
      padding: .5rem 1rem;
      color: white;
      font-family: 'Press Start 2P', monospace;
      font-size: .4rem;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 15px rgba(124, 58, 237, .3);
      white-space: nowrap;
    }

    .btn-editar-modo:hover {
      transform: translateY(-1px);
    }

    .btn-editar-modo.activo {
      background: linear-gradient(135deg, #facc15, #f59e0b);
      color: #0f172a;
      box-shadow: 0 4px 15px rgba(250, 204, 21, .3);
    }

    /* Navegación de semana */
    .semana-nav {
      display: flex;
      align-items: center;
      gap: .625rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .semana-btn {
      background: rgba(124, 58, 237, .1);
      border: 1px solid var(--border-b);
      border-radius: 8px;
      padding: .375rem .75rem;
      color: var(--violet-l);
      cursor: pointer;
      font-size: .9rem;
      transition: all .15s;
    }

    .semana-btn:hover {
      background: rgba(124, 58, 237, .2);
    }

    .semana-label {
      font-family: 'Press Start 2P', monospace;
      font-size: .42rem;
      color: white;
      background: rgba(124, 58, 237, .12);
      border: 1px solid var(--border-b);
      border-radius: 10px;
      padding: .375rem .875rem;
    }

    .semana-badge-actual {
      background: rgba(34, 197, 94, .1);
      border: 1px solid rgba(34, 197, 94, .3);
      border-radius: 20px;
      padding: .2rem .625rem;
      font-size: .72rem;
      font-weight: 800;
      color: #86efac;
    }

    .semana-badge-prox {
      background: rgba(250, 204, 21, .1);
      border: 1px solid rgba(250, 204, 21, .3);
      border-radius: 20px;
      padding: .2rem .625rem;
      font-size: .72rem;
      font-weight: 800;
      color: #fde68a;
    }

    /* Toggle viernes */
    .viernes-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: rgba(124, 58, 237, .08);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: .3rem .75rem;
      font-size: .72rem;
      font-weight: 800;
      color: var(--violet-l);
      cursor: pointer;
      transition: all .15s;
    }

    .viernes-toggle-btn:hover {
      background: rgba(124, 58, 237, .15);
    }

    /* ══════════════════════════════════════════
   TABLA DE HORARIO
══════════════════════════════════════════ */
    .horario-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border-b);
      margin-bottom: 1.25rem;
    }

    .horario-tabla {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
    }

    /* Encabezados */
    .th-dia {
      background: var(--bg2);
      padding: .625rem .5rem;
      font-family: 'Press Start 2P', monospace;
      font-size: .35rem;
      color: var(--violet-l);
      text-align: center;
      border-bottom: 2px solid var(--border-b);
      border-right: 1px solid rgba(124, 58, 237, .12);
      white-space: nowrap;
    }

    .th-bloque-col {
      background: var(--bg3);
      border-right: 2px solid var(--border-b);
      min-width: 105px;
    }

    .th-viernes-hora {
      background: var(--bg3);
      border-right: 1px solid rgba(124, 58, 237, .12);
      min-width: 88px;
      font-size: .3rem;
      color: var(--text-mut);
    }

    .th-dia-hoy {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    /* Columna de bloques (horario L-J) */
    .td-bloque {
      background: var(--bg3);
      padding: .45rem .5rem;
      text-align: center;
      border-right: 2px solid var(--border-b);
      border-bottom: 1px solid rgba(124, 58, 237, .1);
      white-space: nowrap;
      width: 1%;
      /* colapsar al mínimo necesario */
    }

    .bloque-hora {
      font-size: .67rem;
      color: var(--text-mut);
      font-weight: 700;
      white-space: nowrap;
    }

    .bloque-hora-edit {
      display: none;
      width: 100%;
      padding: .2rem .3rem;
      background: var(--bg4);
      border: 1px solid var(--violet);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: .65rem;
      font-weight: 700;
      text-align: center;
    }

    /* Columna horario viernes */
    .td-viernes-hora {
      background: var(--bg3);
      padding: .45rem .35rem;
      text-align: center;
      border-right: 1px solid rgba(124, 58, 237, .1);
      border-bottom: 1px solid rgba(124, 58, 237, .1);
      white-space: nowrap;
      width: 1%;
      /* colapsar al mínimo necesario */
    }

    .viernes-hora-txt {
      font-size: .63rem;
      color: var(--text-mut);
      font-weight: 700;
    }

    .viernes-hora-edit {
      display: none;
      width: 100%;
      padding: .2rem .25rem;
      background: var(--bg4);
      border: 1px solid var(--violet);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: .6rem;
      font-weight: 700;
      text-align: center;
    }

    /* Recreo y Almuerzo */
    .fila-recreo td {
      border-bottom: 1px solid rgba(6, 182, 212, .12);
      background: rgba(6, 182, 212, .03);
    }

    .recreo-label {
      font-family: 'Press Start 2P', monospace;
      font-size: .32rem;
      color: var(--cyan);
      text-align: center;
      padding: .45rem;
      letter-spacing: .05em;
    }

    .fila-almuerzo td {
      border-bottom: 1px solid rgba(250, 204, 21, .12);
      background: rgba(250, 204, 21, .03);
    }

    .almuerzo-label {
      font-family: 'Press Start 2P', monospace;
      font-size: .32rem;
      color: var(--yellow);
      text-align: center;
      padding: .45rem;
      letter-spacing: .05em;
    }

    /* Celdas de asignatura */
    .td-asig {
      padding: .35rem .3rem;
      text-align: center;
      border-right: 1px solid rgba(124, 58, 237, .08);
      border-bottom: 1px solid rgba(124, 58, 237, .08);
      transition: background .15s;
      position: relative;
      min-width: 100px;
    }

    .td-asig.clickable {
      cursor: pointer;
    }

    .td-asig.clickable:hover {
      background: rgba(124, 58, 237, .07);
    }

    .td-vacio {
      border-right: 1px solid rgba(124, 58, 237, .06);
      border-bottom: 1px solid rgba(124, 58, 237, .06);
    }

    /* Pill de asignatura */
    .asig-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .25rem;
      border-radius: 8px;
      padding: .3rem .45rem;
      font-size: .68rem;
      font-weight: 800;
      width: 100%;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      box-sizing: border-box;
    }

    /* Colores por asignatura */
    .asig-Matematicas {
      background: rgba(59, 130, 246, .13);
      border-color: rgba(59, 130, 246, .3);
      color: #93c5fd;
    }

    .asig-Lenguaje {
      background: rgba(239, 68, 68, .13);
      border-color: rgba(239, 68, 68, .3);
      color: #fca5a5;
    }

    .asig-Historia {
      background: rgba(250, 204, 21, .1);
      border-color: rgba(250, 204, 21, .3);
      color: #fde68a;
    }

    .asig-Ciencias {
      background: rgba(34, 197, 94, .1);
      border-color: rgba(34, 197, 94, .3);
      color: #86efac;
    }

    .asig-Ingles {
      background: rgba(249, 115, 22, .1);
      border-color: rgba(249, 115, 22, .3);
      color: #fdba74;
    }

    .asig-EdFisica {
      background: rgba(6, 182, 212, .1);
      border-color: rgba(6, 182, 212, .3);
      color: #67e8f9;
    }

    .asig-Musica {
      background: rgba(168, 85, 247, .1);
      border-color: rgba(168, 85, 247, .3);
      color: #d8b4fe;
    }

    .asig-Artes {
      background: rgba(236, 72, 153, .1);
      border-color: rgba(236, 72, 153, .3);
      color: #f9a8d4;
    }

    .asig-Tecnologia {
      background: rgba(100, 116, 139, .1);
      border-color: rgba(100, 116, 139, .3);
      color: #cbd5e1;
    }

    .asig-Orientacion {
      background: rgba(20, 184, 166, .1);
      border-color: rgba(20, 184, 166, .3);
      color: #5eead4;
    }

    .asig-EduCristiana {
      background: rgba(251, 191, 36, .1);
      border-color: rgba(251, 191, 36, .3);
      color: #fcd34d;
    }

    .asig-ArtesVisuales {
      background: rgba(244, 114, 182, .1);
      border-color: rgba(244, 114, 182, .3);
      color: #f9a8d4;
    }

    .asig-Libre {
      background: rgba(71, 85, 105, .1);
      border-color: rgba(71, 85, 105, .3);
      color: #94a3b8;
    }

    /* Celda con evaluación próxima */
    .td-asig.tiene-eval .asig-pill {
      animation: evalPulse 2.5s ease-in-out infinite;
    }

    @keyframes evalPulse {

      0%,
      100% {
        box-shadow: 0 0 6px rgba(250, 204, 21, .2);
      }

      50% {
        box-shadow: 0 0 18px rgba(250, 204, 21, .55), 0 0 30px rgba(250, 204, 21, .15);
      }
    }

    .eval-dot {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 7px;
      height: 7px;
      background: var(--yellow);
      border-radius: 50%;
      box-shadow: 0 0 5px var(--yellow);
      pointer-events: none;
    }

    /* Modo admin — celda editable */
    .td-asig.modo-admin {
      cursor: pointer;
    }

    .td-asig.modo-admin:hover {
      background: rgba(124, 58, 237, .12);
      outline: 2px dashed rgba(124, 58, 237, .4);
      outline-offset: -2px;
    }

    .td-asig.modo-admin.editando {
      background: rgba(124, 58, 237, .18);
      outline: 2px solid var(--violet);
      outline-offset: -2px;
    }

    .edit-hint {
      position: absolute;
      bottom: 2px;
      right: 3px;
      font-size: .5rem;
      color: var(--violet);
      opacity: 0;
      transition: opacity .15s;
      pointer-events: none;
    }

    .td-asig.modo-admin:hover .edit-hint {
      opacity: 1;
    }

    /* Select inline para admin */
    .asig-select {
      width: 100%;
      padding: .25rem .3rem;
      background: var(--bg4);
      border: 1px solid var(--violet);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      cursor: pointer;
    }

    .asig-select:focus {
      outline: none;
    }

    /* Columna viernes modo admin */
    .td-bloque.modo-admin-hora {
      cursor: pointer;
    }

    .td-bloque.modo-admin-hora:hover .bloque-hora {
      display: none;
    }

    .td-bloque.modo-admin-hora:hover .bloque-hora-edit {
      display: block;
    }

    .td-viernes-hora.modo-admin-hora {
      cursor: pointer;
    }

    .td-viernes-hora.modo-admin-hora:hover .viernes-hora-txt {
      display: none;
    }

    .td-viernes-hora.modo-admin-hora:hover .viernes-hora-edit {
      display: block;
    }

    /* ══════════════════════════════════════════
   LEYENDA
══════════════════════════════════════════ */
    .leyenda {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1.25rem;
    }

    .leyenda-item {
      display: flex;
      align-items: center;
      gap: .35rem;
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-dim);
    }

    .leyenda-dot {
      width: 9px;
      height: 9px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════
   EVALUACIONES PENDIENTES (colapsable)
══════════════════════════════════════════ */
    .evals-section {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .evals-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(124, 58, 237, .07);
      border: none;
      padding: .875rem 1.25rem;
      cursor: pointer;
      color: white;
      transition: background .15s;
    }

    .evals-toggle:hover {
      background: rgba(124, 58, 237, .13);
    }

    .evals-toggle-left {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-family: 'Press Start 2P', monospace;
      font-size: .4rem;
      color: var(--violet-l);
    }

    .evals-badge {
      background: rgba(250, 204, 21, .12);
      border: 1px solid rgba(250, 204, 21, .3);
      border-radius: 20px;
      padding: .2rem .625rem;
      font-size: .7rem;
      font-weight: 800;
      color: #fde68a;
      font-family: 'Nunito', sans-serif;
    }

    .evals-chevron {
      color: var(--violet);
      font-size: 1rem;
      transition: transform .25s;
    }

    .evals-chevron.open {
      transform: rotate(180deg);
    }

    .evals-lista {
      display: none;
      flex-direction: column;
    }

    .evals-lista.visible {
      display: flex;
    }

    .eval-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .75rem 1.25rem;
      border-top: 1px solid rgba(124, 58, 237, .1);
      cursor: pointer;
      transition: background .15s;
    }

    .eval-row:hover {
      background: rgba(124, 58, 237, .06);
    }

    .eval-row-emoji {
      font-size: 1.35rem;
      flex-shrink: 0;
    }

    .eval-row-info {
      flex: 1;
      min-width: 0;
    }

    .eval-row-asig {
      font-family: 'Press Start 2P', monospace;
      font-size: .38rem;
      margin-bottom: .25rem;
    }

    .eval-row-fecha {
      font-size: .78rem;
      color: var(--text-mut);
      font-weight: 700;
    }

    .eval-row-contenido {
      font-size: .75rem;
      color: var(--text-dim);
      font-weight: 700;
      margin-top: .15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .eval-row-right {
      text-align: right;
      flex-shrink: 0;
    }

    .eval-row-dias {
      font-family: 'Press Start 2P', monospace;
      font-size: .35rem;
      margin-bottom: .3rem;
    }

    .dias-urgente {
      color: var(--red);
    }

    .dias-pronto {
      color: var(--orange);
    }

    .dias-normal {
      color: var(--text-mut);
    }

    .eval-row-estado {
      font-size: .68rem;
      font-weight: 800;
      padding: .2rem .45rem;
      border-radius: 20px;
      white-space: nowrap;
      display: inline-block;
    }

    .estado-pendiente {
      background: rgba(100, 116, 139, .15);
      color: var(--text-dim);
    }

    .estado-estudiado {
      background: rgba(34, 197, 94, .1);
      color: #86efac;
    }

    .estado-rendida {
      background: rgba(250, 204, 21, .1);
      color: #fde68a;
    }

    .evals-empty {
      padding: 1.25rem;
      text-align: center;
      font-size: .85rem;
      color: var(--text-mut);
      font-weight: 700;
    }

    /* ══════════════════════════════════════════
   POPUP EVALUACIÓN
══════════════════════════════════════════ */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }

    .popup-overlay.active {
      display: flex;
    }

    .popup-card {
      background: var(--bg2);
      border: 1px solid var(--border-b);
      border-radius: 20px;
      padding: 1.5rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 0 60px rgba(124, 58, 237, .2);
      animation: popIn .2s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.92)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: .875rem;
      margin-bottom: 1rem;
    }

    .popup-emoji {
      font-size: 2rem;
    }

    .popup-asig {
      font-family: 'Press Start 2P', monospace;
      font-size: .52rem;
      color: var(--violet-l);
    }

    .popup-fecha {
      font-size: .8rem;
      color: var(--text-mut);
      font-weight: 700;
      margin-top: .25rem;
    }

    .popup-close {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-mut);
      font-size: 1.3rem;
      cursor: pointer;
      padding: .25rem;
      transition: color .15s;
    }

    .popup-close:hover {
      color: var(--text);
    }

    .popup-contenido {
      background: rgba(124, 58, 237, .07);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .875rem;
      font-size: .85rem;
      color: #cbd5e1;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: .875rem;
    }

    .popup-dias {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-family: 'Press Start 2P', monospace;
      font-size: .38rem;
      margin-bottom: 1rem;
    }

    .popup-acciones {
      display: flex;
      gap: .625rem;
    }

    .popup-btn {
      flex: 1;
      padding: .6rem;
      border-radius: 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: .38rem;
      cursor: pointer;
      transition: all .15s;
      border: none;
    }

    .popup-btn-cal {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
    }

    .popup-btn-cal:hover {
      transform: translateY(-1px);
    }

    .popup-btn-cerrar {
      background: rgba(124, 58, 237, .15);
      border: 1px solid var(--border-b);
      color: var(--violet-l);
    }

    /* ══════════════════════════════════════════
   SPINNER
══════════════════════════════════════════ */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 3rem;
      color: var(--text-mut);
      font-size: .875rem;
      font-weight: 700;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(124, 58, 237, .2);
      border-top-color: var(--violet);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* ══════════════════════════════════════════
   TOASTS
══════════════════════════════════════════ */
    #toastContainer {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: .75rem;
      background: var(--bg2);
      border: 1px solid var(--border-b);
      border-radius: 12px;
      padding: .75rem 1rem;
      font-size: .85rem;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .3);
      animation: toastIn .3s ease;
      max-width: 320px;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(10px)
      }
    }

    /* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
    @media(max-width:900px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      /* padding del .main lo maneja shared.css */
    }

    @media(max-width:600px) {
      .horario-titulo {
        font-size: .55rem;
      }

      .horario-chips {
        gap: .35rem;
      }

      .chip {
        font-size: .68rem;
        padding: .25rem .6rem;
      }

      .td-asig {
        min-width: 72px;
      }

      .asig-pill {
        font-size: .58rem;
        padding: .2rem .25rem;
        gap: .15rem;
      }

      .td-bloque {
        min-width: 78px;
      }

      .bloque-hora {
        font-size: .58rem;
      }

      .viernes-hora-txt {
        font-size: .56rem;
      }
    }

    @media(max-width:400px) {
      .td-asig {
        min-width: 60px;
      }

      .asig-pill {
        font-size: .52rem;
        padding: .18rem .2rem;
      }

      .td-bloque {
        min-width: 68px;
      }

      .bloque-hora {
        font-size: .52rem;
      }
    }
  </style>
</head>

<body>

  <!-- Header global — shared.js lo inyecta aquí -->
  <div id="sharedHeader"></div>

  <!-- Spinner inicial mientras se verifica la sesión -->
  <div id="authSpinner" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
    <div style="text-align:center">
      <div class="spinner"></div>
      <div style="font-size:.8rem;color:#475569;font-weight:700;margin-top:1rem">Verificando sesión...</div>
    </div>
  </div>

  <div class="layout" id="horarioLayout" style="display:none">

    <main class="main">
      <div class="main-content-horario">

        <!-- ════════════════════════════════════
         VISTA INVITADO
    ════════════════════════════════════ -->
        <div id="vistaInvitado" style="display:none">
          <div class="invitado-card">
            <div class="invitado-logo">
              <div class="inv-logo-box">📅</div>
              <div>
                <div style="font-family:'Press Start 2P',monospace;font-size:.75rem;color:#a855f7">EduCoins</div>
                <div style="font-size:.72rem;color:var(--text-dim);font-weight:700;margin-top:.25rem">Horario de Clases
                </div>
              </div>
            </div>

            <div class="invitado-titulo" id="invitadoTitulo">VER HORARIO</div>
            <div class="invitado-sub" id="invitadoSub">Selecciona tu colegio y curso para ver el horario 📚</div>

            <label class="inv-label">Colegio</label>
            <select class="inv-select" id="invColegioSelect">
              <option value="">Selecciona un colegio...</option>
            </select>

            <label class="inv-label">Curso</label>
            <select class="inv-select" id="invGradoSelect">
              <option value="">Selecciona un curso...</option>
              <option value="1">1° Básico</option>
              <option value="2">2° Básico</option>
              <option value="3">3° Básico</option>
              <option value="4">4° Básico</option>
              <option value="5">5° Básico</option>
              <option value="6">6° Básico</option>
              <option value="7">7° Básico</option>
              <option value="8">8° Básico</option>
            </select>

            <button class="inv-btn" id="invVerBtn" disabled>🔍 Ver Horario →</button>
          </div>
        </div>

        <!-- ════════════════════════════════════
         VISTA HORARIO
    ════════════════════════════════════ -->
        <div id="vistaHorario">

          <!-- Header -->
          <div class="horario-page-header">
            <div class="horario-titulo-wrap">
              <div class="horario-titulo">
                📅 HORARIO DE CLASES
              </div>
              <div class="horario-subtitulo" id="horarioSubtitulo">Cargando...</div>
            </div>
            <div class="horario-chips" id="horarioChips"></div>
            <button class="btn-editar-modo" id="btnEditarModo" style="display:none">
              ✏️ EDITAR HORARIO
            </button>
          </div>

          <!-- Semana nav -->
          <div class="semana-nav">
            <button class="semana-btn" id="btnSemAnt">‹</button>
            <div class="semana-label" id="semanaLabel">—</div>
            <button class="semana-btn" id="btnSemSig">›</button>
            <button class="semana-btn" id="btnSemHoy"
              style="font-size:.7rem;font-weight:800;color:var(--cyan);border-color:rgba(6,182,212,.3)">
              Hoy
            </button>
            <div id="semanaBadge"></div>
            <button class="viernes-toggle-btn" id="btnToggleViernes">
              <span id="viernesIcon">◀</span>
              <span id="viernesToggleTxt">Ocultar Viernes especial</span>
            </button>
          </div>

          <!-- Tabla horario -->
          <div class="horario-wrap">
            <div id="horarioTablaWrap">
              <div class="spinner-wrap">
                <div class="spinner"></div>
                Cargando horario...
              </div>
            </div>
          </div>

          <!-- Leyenda -->
          <div class="leyenda" id="leyenda"></div>

          <!-- Evaluaciones pendientes -->
          <div class="evals-section" id="evalsSection" style="display:none">
            <button class="evals-toggle" id="btnToggleEvals">
              <div class="evals-toggle-left">
                📋 EVALUACIONES PENDIENTES
                <span class="evals-badge" id="evalsBadge">0</span>
              </div>
              <span class="evals-chevron" id="evalsChevron">▾</span>
            </button>
            <div class="evals-lista" id="evalsLista"></div>
          </div>

        </div><!-- /vistaHorario -->

      </div><!-- /main-content-horario -->
    </main>
  </div><!-- /layout -->

  <!-- Popup evaluación -->
  <div class="popup-overlay" id="popupEval">
    <div class="popup-card">
      <div class="popup-header">
        <span class="popup-emoji" id="popupEmoji">📚</span>
        <div>
          <div class="popup-asig" id="popupAsig">—</div>
          <div class="popup-fecha" id="popupFecha">—</div>
        </div>
        <button class="popup-close" id="btnCerrarPopup">✕</button>
      </div>
      <div class="popup-contenido" id="popupContenido">—</div>
      <div class="popup-dias" id="popupDias"></div>
      <div class="popup-acciones">
        <button class="popup-btn popup-btn-cal" id="btnPopupCal">VER EN CALENDARIO →</button>
        <button class="popup-btn popup-btn-cerrar" id="btnPopupCerrar">CERRAR</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toastContainer"></div>

  <!-- Scripts -->
  <script src="../auth/clerk-config.js"></script>
  <script src="../shared/shared.js"></script>
  <script src="../shared/clerk-guard.js"></script>
  <script>
    // Cargar header global y marcar página activa
    initShared('horario');
  </script>
  <script src="horario.js"></script>

</body>

</html>
